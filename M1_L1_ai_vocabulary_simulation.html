<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Key Vocabulary — Interactive Demo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --ink:#0D1B2A;
  --ink2:#1C2E42;
  --teal:#0D7377;
  --teal-light:#14BDBD;
  --amber:#E8902A;
  --red:#C0392B;
  --green:#1A7D46;
  --slate:#4A5568;
  --fog:#8A97A8;
  --cloud:#EFF2F6;
  --paper:#F8F9FC;
  --white:#FFFFFF;
  --border:#D6DCE6;
}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding:36px 20px 60px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ── Header ── */
.page-header{text-align:center;margin-bottom:40px;max-width:680px}
.kicker{
  font-family:'DM Mono',monospace;
  font-size:10.5px;letter-spacing:3px;text-transform:uppercase;
  color:var(--teal);margin-bottom:12px;
}
h1{
  font-family:'Fraunces',serif;
  font-size:clamp(26px,5vw,40px);
  font-weight:700;color:var(--ink);line-height:1.15;margin-bottom:10px;
}
.lead{font-size:14px;color:var(--slate);line-height:1.7;font-weight:300}

/* ── Nav pills ── */
.vocab-nav{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  margin-bottom:36px;max-width:820px;width:100%;
}
.pill{
  font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;
  padding:8px 18px;border-radius:30px;border:1.5px solid var(--border);
  background:var(--white);color:var(--slate);cursor:pointer;
  transition:all .2s;
}
.pill:hover{border-color:var(--teal);color:var(--teal)}
.pill.active{background:var(--ink);border-color:var(--ink);color:var(--white)}

/* ── Stage ── */
.stage{
  max-width:820px;width:100%;
  background:var(--white);border-radius:20px;
  border:1px solid var(--border);
  box-shadow:0 8px 40px rgba(13,27,42,.08);
  overflow:hidden;
  min-height:420px;
}

.term-header{
  padding:26px 30px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:16px;
}
.term-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.term-title-group{flex:1}
.term-name{
  font-family:'Fraunces',serif;font-size:26px;font-weight:700;
  color:var(--ink);line-height:1.1;margin-bottom:4px;
}
.term-tagline{font-size:13px;color:var(--fog);font-weight:300}

.sim-body{padding:28px 30px}

/* ── SHARED sim pieces ── */
.sim-label{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;color:var(--fog);margin-bottom:10px;
}

.btn{
  font-family:'DM Sans',sans-serif;font-size:12.5px;font-weight:600;
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .18s;
}
.btn-primary{background:var(--ink);color:var(--white)}
.btn-primary:hover{background:var(--ink2);transform:translateY(-1px)}
.btn-secondary{background:var(--cloud);color:var(--slate);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--ink);color:var(--ink)}
.btn-teal{background:var(--teal);color:var(--white)}
.btn-teal:hover{background:#0a5c60;transform:translateY(-1px)}
.btn-amber{background:var(--amber);color:var(--white)}
.btn-amber:hover{background:#c47420;transform:translateY(-1px)}

.controls{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}

/* ─────────────────────────────
   1. TOKEN SIM
───────────────────────────── */
#sim-token .input-row{display:flex;gap:10px;margin-bottom:18px}
#sim-token input{
  flex:1;font-family:'DM Mono',monospace;font-size:14px;
  padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--cloud);color:var(--ink);outline:none;
  transition:border-color .2s;
}
#sim-token input:focus{border-color:var(--teal)}

.token-display{
  display:flex;flex-wrap:wrap;gap:6px;
  min-height:56px;align-items:flex-start;
  background:var(--cloud);border-radius:10px;
  padding:12px;border:1px solid var(--border);
  margin-bottom:12px;
}

.tok{
  font-family:'DM Mono',monospace;font-size:13px;font-weight:500;
  padding:5px 10px;border-radius:6px;border:1.5px solid;
  animation:popIn .25s cubic-bezier(.34,1.56,.64,1) forwards;
  opacity:0;
}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}

.token-stats{
  display:flex;gap:20px;font-size:13px;color:var(--slate);
  font-family:'DM Mono',monospace;
}
.token-stats strong{color:var(--ink)}

/* ─────────────────────────────
   2. CONTEXT WINDOW SIM
───────────────────────────── */
.window-visual{
  border:2px solid var(--teal);border-radius:12px;overflow:hidden;
  margin-bottom:16px;position:relative;
}
.window-bar{
  background:var(--teal);padding:6px 14px;
  font-family:'DM Mono',monospace;font-size:10px;
  color:white;letter-spacing:1px;text-transform:uppercase;
  display:flex;justify-content:space-between;align-items:center;
}
.window-bar .pct{font-size:13px;font-weight:500}
.window-inner{padding:14px;min-height:100px;display:flex;flex-direction:column;gap:6px}

.msg-bubble{
  border-radius:8px;padding:8px 12px;font-size:13px;line-height:1.5;
  animation:slideIn .3s ease forwards;opacity:0;
  max-width:90%;
}
@keyframes slideIn{from{transform:translateX(-10px);opacity:0}to{transform:translateX(0);opacity:1}}

.msg-bubble.user{
  background:#EBF4FA;border:1px solid #B8D9EF;color:var(--ink2);
  align-self:flex-start;
}
.msg-bubble.ai{
  background:#F0FAF4;border:1px solid #B8DFC8;color:var(--ink2);
  align-self:flex-end;
}
.msg-bubble.warn{
  background:#FFF4E5;border:1px solid #F5C06A;color:#7A4A00;
  align-self:center;font-weight:600;text-align:center;font-size:12px;
}

.capacity-bar-wrap{
  height:14px;background:var(--cloud);border-radius:20px;
  overflow:hidden;border:1px solid var(--border);margin-bottom:8px;
}
.capacity-bar{
  height:100%;border-radius:20px;
  transition:width .5s ease,background .5s;
  background:var(--green);
}

.capacity-label{font-size:12px;color:var(--slate);font-family:'DM Mono',monospace;margin-bottom:14px}

/* ─────────────────────────────
   3. TEMPERATURE SIM
───────────────────────────── */
.temp-dial-row{
  display:flex;align-items:center;gap:14px;margin-bottom:20px;
  background:var(--cloud);padding:14px 18px;border-radius:10px;
  border:1px solid var(--border);
}
.temp-emoji{font-size:28px;flex-shrink:0;transition:all .3s}
input[type=range]{flex:1;accent-color:var(--teal);cursor:pointer}
.temp-readout{
  font-family:'DM Mono',monospace;font-size:18px;font-weight:500;
  color:var(--ink);width:38px;text-align:right;flex-shrink:0;
}
.temp-mood{font-size:11px;font-weight:600;color:var(--teal);width:80px;text-align:center;flex-shrink:0}

.response-compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.response-box{
  background:var(--cloud);border-radius:10px;padding:14px 16px;
  border:1.5px solid var(--border);
}
.response-box .rb-label{
  font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:8px;font-weight:500;
}
.response-box.cold .rb-label{color:var(--teal)}
.response-box.hot .rb-label{color:var(--amber)}
.response-box.cold{border-color:#B8D9EF}
.response-box.hot{border-color:#F5C06A}

.response-text{font-size:13px;line-height:1.6;color:var(--slate);min-height:70px}
.response-text .highlight{
  border-radius:3px;padding:1px 4px;font-weight:600;
}
.cold-h{background:#DCEEFA;color:#0D4F7A}
.hot-h{background:#FDE8C8;color:#7A3D00}

.live-output{
  background:var(--cloud);border-radius:10px;padding:14px 16px;
  border:1.5px solid var(--border);margin-bottom:4px;
  min-height:60px;
}
.live-output .lo-label{
  font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:2px;
  text-transform:uppercase;color:var(--fog);margin-bottom:8px;font-weight:500;
}
.live-output .lo-text{font-size:13px;line-height:1.7;color:var(--ink)}

/* ─────────────────────────────
   4. HALLUCINATION SIM
───────────────────────────── */
.doc-area{
  background:var(--cloud);border-radius:10px;padding:16px 18px;
  border:1px solid var(--border);margin-bottom:14px;font-size:14px;
  line-height:1.8;color:var(--ink2);position:relative;min-height:80px;
}
.doc-area .claim{
  cursor:pointer;border-radius:4px;padding:2px 5px;
  transition:all .2s;border-bottom:2px solid transparent;
}
.doc-area .claim:hover{background:rgba(13,115,119,.1);border-color:var(--teal)}
.doc-area .claim.true-fact{background:#D4F0DA;border-color:var(--green);color:#0D4A24}
.doc-area .claim.false-fact{background:#FAD7D4;border-color:var(--red);color:#6B0F0A;text-decoration:line-through}
.doc-area .claim.uncertain{background:#FEF3CD;border-color:var(--amber);color:#5A3500}

.fact-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--slate)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.fact-verdict{
  background:var(--cloud);border-radius:10px;padding:14px 16px;
  border:1.5px solid var(--border);font-size:13px;color:var(--slate);
  min-height:52px;transition:all .3s;
}
.fact-verdict.shown{border-color:var(--teal)}

/* ─────────────────────────────
   5. INFERENCE SIM
───────────────────────────── */
.pipeline{display:flex;flex-direction:column;gap:0}

.pipe-stage{
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;border-radius:10px;
  background:var(--cloud);border:1.5px solid var(--border);
  margin-bottom:6px;transition:all .35s;opacity:.45;
  position:relative;
}
.pipe-stage.active{
  background:white;border-color:var(--teal);
  box-shadow:0 0 0 3px rgba(13,115,119,.1);opacity:1;
}
.pipe-stage.done{
  background:#F0FAF4;border-color:var(--green);opacity:1;
}

.pipe-icon{font-size:20px;flex-shrink:0;width:32px;text-align:center}
.pipe-content{flex:1}
.pipe-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px}
.pipe-desc{font-size:12px;color:var(--fog)}
.pipe-status{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  padding:3px 10px;border-radius:20px;flex-shrink:0;
}
.pipe-stage.active .pipe-status{background:var(--teal);color:white}
.pipe-stage.done .pipe-status{background:var(--green);color:white}
.pipe-stage:not(.active):not(.done) .pipe-status{background:var(--border);color:var(--fog)}

.pipe-arrow{text-align:center;color:var(--fog);font-size:14px;margin:-2px 0;padding:2px 0}

.prompt-input-row{display:flex;gap:10px;margin-bottom:16px}
.prompt-input-row input{
  flex:1;font-family:'DM Mono',monospace;font-size:13px;
  padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--cloud);color:var(--ink);outline:none;
  transition:border-color .2s;
}
.prompt-input-row input:focus{border-color:var(--teal)}

.output-area{
  background:var(--cloud);border-radius:10px;padding:14px 16px;
  border:1.5px solid var(--border);min-height:56px;
  font-size:13.5px;line-height:1.7;color:var(--ink);
  font-family:'DM Mono',monospace;margin-top:12px;
  display:none;
}
.output-area.show{display:block;animation:slideIn .4s ease forwards}

/* ── Transition between sims ── */
.sim-body{animation:fadeUp .3s ease forwards}
@keyframes fadeUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

@media(max-width:540px){
  .response-compare{grid-template-columns:1fr}
  .term-header{flex-direction:column;gap:10px}
  .vocab-nav{gap:6px}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="kicker">Interactive Glossary</div>
  <h1>Key AI Vocabulary</h1>
  <p class="lead">Don't just read the definition — play with it. Click each term to explore an interactive simulation that shows exactly what it means.</p>
</div>

<div class="vocab-nav" id="vocabNav">
  <button class="pill active" data-term="token">Token</button>
  <button class="pill" data-term="context">Context Window</button>
  <button class="pill" data-term="temperature">Temperature</button>
  <button class="pill" data-term="hallucination">Hallucination</button>
  <button class="pill" data-term="inference">Inference</button>
</div>

<div class="stage" id="stage"></div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const TERMS = {
  token: {
    icon: "🔤", iconBg: "#EBF4FA", iconBorder: "#B8D9EF",
    name: "Token",
    tagline: "The atom of language — roughly ¾ of a word",
    render: renderToken
  },
  context: {
    icon: "🧠", iconBg: "#F0FAF4", iconBorder: "#B8DFC8",
    name: "Context Window",
    tagline: "The model's working memory — everything it can see at once",
    render: renderContext
  },
  temperature: {
    icon: "🌡️", iconBg: "#FFF4E5", iconBorder: "#F5C06A",
    name: "Temperature",
    tagline: "The creativity dial — from robotic to unpredictable",
    render: renderTemperature
  },
  hallucination: {
    icon: "👻", iconBg: "#FAD7D4", iconBorder: "#EFA9A4",
    name: "Hallucination",
    tagline: "Confident. Fluent. Wrong. Click the claims to fact-check them",
    render: renderHallucination
  },
  inference: {
    icon: "⚡", iconBg: "#F5F0FF", iconBorder: "#C4B0F0",
    name: "Inference",
    tagline: "Watch the model turn your prompt into a response, step by step",
    render: renderInference
  }
};

// ─── NAV ────────────────────────────────────────────────────────────────────
let currentTerm = "token";
document.getElementById("vocabNav").addEventListener("click", e => {
  const pill = e.target.closest(".pill");
  if (!pill) return;
  const term = pill.dataset.term;
  document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
  pill.classList.add("active");
  currentTerm = term;
  renderStage(term);
});

function renderStage(term) {
  const t = TERMS[term];
  const stage = document.getElementById("stage");
  stage.innerHTML = `
    <div class="term-header">
      <div class="term-icon" style="background:${t.iconBg};border:2px solid ${t.iconBorder}">${t.icon}</div>
      <div class="term-title-group">
        <div class="term-name">${t.name}</div>
        <div class="term-tagline">${t.tagline}</div>
      </div>
    </div>
    <div class="sim-body" id="simBody"></div>
  `;
  t.render(document.getElementById("simBody"));
}

// ─── 1. TOKEN ────────────────────────────────────────────────────────────────
const TOKEN_COLORS = [
  {bg:"#EBF4FA",border:"#1A6FAA",text:"#0D3F63"},
  {bg:"#F0FAF4",border:"#1A7D46",text:"#0A3D20"},
  {bg:"#FFF4E5",border:"#E8902A",text:"#6A3C00"},
  {bg:"#F5F0FF",border:"#7C5CBF",text:"#3D1E80"},
  {bg:"#FAD7D4",border:"#C0392B",text:"#6B0F0A"},
  {bg:"#EBF8F8",border:"#0D7377",text:"#043335"},
];

function tokenize(text) {
  // Rough tokenization: split on spaces but keep punctuation separate
  const rough = text.match(/[a-zA-Z']+|[^a-zA-Z'\s]+|\s+/g) || [];
  const tokens = [];
  for (const chunk of rough) {
    if (/^\s+$/.test(chunk)) continue;
    // split long words into ~4-char chunks to mimic BPE
    if (/^[a-zA-Z']+$/.test(chunk) && chunk.length > 5) {
      let i = 0;
      while (i < chunk.length) {
        const len = Math.floor(Math.random() * 3) + 3; // 3-5 chars
        tokens.push(chunk.slice(i, i + len));
        i += len;
      }
    } else {
      tokens.push(chunk);
    }
  }
  return tokens;
}

function renderToken(body) {
  body.innerHTML = `
    <div class="sim-label">Type any text — watch it split into tokens</div>
    <div id="sim-token">
      <div class="input-row">
        <input type="text" id="tokenInput" placeholder="e.g. The capital of Pakistan is Islamabad" value="The capital of Pakistan is Islamabad">
        <button class="btn btn-primary" id="tokenizeBtn">Tokenize →</button>
      </div>
      <div class="token-display" id="tokenDisplay"></div>
      <div class="token-stats" id="tokenStats"></div>
      <div class="controls">
        <button class="btn btn-secondary" id="clearTokenBtn">Clear</button>
        <button class="btn btn-teal" id="exampleBtn">Try another example</button>
      </div>
    </div>
  `;

  const examples = [
    "The capital of Pakistan is Islamabad",
    "ChatGPT, Claude, and Gemini are multimodal",
    "Please find attached the quarterly report",
    "def calculate_area(radius): return 3.14",
    "Hallucination is confidently incorrect",
    "Temperature controls randomness in AI"
  ];
  let exIdx = 0;

  function doTokenize(text) {
    const tokens = tokenize(text.trim());
    const display = document.getElementById("tokenDisplay");
    const stats = document.getElementById("tokenStats");
    display.innerHTML = "";
    tokens.forEach((tok, i) => {
      const c = TOKEN_COLORS[i % TOKEN_COLORS.length];
      const el = document.createElement("div");
      el.className = "tok";
      el.style.background = c.bg;
      el.style.borderColor = c.border;
      el.style.color = c.text;
      el.style.animationDelay = (i * 0.04) + "s";
      el.textContent = tok;
      display.appendChild(el);
    });
    const wordCount = text.trim().split(/\s+/).filter(Boolean).length;
    stats.innerHTML = `<span><strong>${tokens.length}</strong> tokens</span><span><strong>${wordCount}</strong> words</span><span>ratio: <strong>${(tokens.length/Math.max(wordCount,1)).toFixed(1)}x</strong></span>`;
  }

  document.getElementById("tokenizeBtn").onclick = () => {
    doTokenize(document.getElementById("tokenInput").value || "");
  };
  document.getElementById("clearTokenBtn").onclick = () => {
    document.getElementById("tokenInput").value = "";
    document.getElementById("tokenDisplay").innerHTML = "";
    document.getElementById("tokenStats").innerHTML = "";
  };
  document.getElementById("exampleBtn").onclick = () => {
    exIdx = (exIdx + 1) % examples.length;
    document.getElementById("tokenInput").value = examples[exIdx];
    doTokenize(examples[exIdx]);
  };
  document.getElementById("tokenInput").addEventListener("keydown", e => {
    if (e.key === "Enter") doTokenize(e.target.value);
  });
  doTokenize("The capital of Pakistan is Islamabad");
}

// ─── 2. CONTEXT WINDOW ───────────────────────────────────────────────────────
const CONTEXT_MSGS = [
  {role:"user", text:"Hi! I'm working on a report about renewable energy in Pakistan."},
  {role:"ai", text:"Great topic! Pakistan has significant potential in solar, wind, and hydro. What angle are you focusing on?"},
  {role:"user", text:"Mainly solar. What are the main barriers to adoption?"},
  {role:"ai", text:"The key barriers are: high upfront costs, grid infrastructure gaps, financing access, and policy uncertainty."},
  {role:"user", text:"Can you give me stats on current solar capacity?"},
  {role:"ai", text:"Pakistan's installed solar capacity reached around 1,700 MW by 2023, growing rapidly thanks to falling panel prices."},
  {role:"user", text:"What about government subsidies?"},
  {role:"ai", text:"The Alternative Energy Development Board (AEDB) offers net metering and some financing schemes, but large subsidy programmes are limited."},
  {role:"user", text:"How does this compare to India?"},
  {role:"ai", text:"India's installed solar is over 70 GW — about 40x larger — backed by massive state incentives and a more mature grid."},
  {role:"user", text:"One more: what's the single biggest opportunity?"},
  {role:"ai", text:"Rooftop solar for SMEs — low installation cost, fast payback, and immediate energy security benefits without grid dependency."},
];
const MAX_MSGS = 6; // simulate limited context

function renderContext(body) {
  let msgCount = 0;
  body.innerHTML = `
    <div class="sim-label">Add messages to fill the context window</div>
    <div class="capacity-bar-wrap"><div class="capacity-bar" id="capBar" style="width:0%"></div></div>
    <div class="capacity-label" id="capLabel">Context used: 0 / ${MAX_MSGS} message pairs (0%)</div>
    <div class="window-visual">
      <div class="window-bar">
        <span>Context Window — Working Memory</span>
        <span class="pct" id="capPct">0%</span>
      </div>
      <div class="window-inner" id="windowInner">
        <div style="color:#8A97A8;font-size:13px;font-family:'DM Mono',monospace;padding:8px 0">No messages yet — add some below</div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="addMsgBtn">+ Add Message Pair</button>
      <button class="btn btn-secondary" id="resetCtxBtn">↺ Reset</button>
    </div>
  `;

  function addMessage() {
    if (msgCount >= CONTEXT_MSGS.length / 2) return;
    const wi = document.getElementById("windowInner");
    if (msgCount === 0) wi.innerHTML = "";

    const userMsg = CONTEXT_MSGS[msgCount * 2];
    const aiMsg = CONTEXT_MSGS[msgCount * 2 + 1];

    [userMsg, aiMsg].forEach((m, delay) => {
      if (!m) return;
      const el = document.createElement("div");
      el.className = `msg-bubble ${m.role}`;
      el.style.animationDelay = (delay * 0.15) + "s";
      el.innerHTML = `<strong>${m.role === "user" ? "You" : "AI"}:</strong> ${m.text}`;
      wi.appendChild(el);
    });
    msgCount++;

    const pct = Math.round((msgCount / MAX_MSGS) * 100);
    const capBar = document.getElementById("capBar");
    capBar.style.width = pct + "%";
    capBar.style.background = pct < 60 ? "#1A7D46" : pct < 85 ? "#E8902A" : "#C0392B";
    document.getElementById("capLabel").textContent = `Context used: ${msgCount} / ${MAX_MSGS} message pairs (${pct}%)`;
    document.getElementById("capPct").textContent = pct + "%";

    if (msgCount >= MAX_MSGS) {
      const warn = document.createElement("div");
      warn.className = "msg-bubble warn";
      warn.style.animationDelay = "0.2s";
      warn.innerHTML = "⚠️ Context window full! Earliest messages will be dropped — the model can no longer 'remember' the beginning of the conversation.";
      wi.appendChild(warn);
      document.getElementById("addMsgBtn").disabled = true;
      document.getElementById("addMsgBtn").style.opacity = "0.4";
    }
    wi.scrollTop = wi.scrollHeight;
  }

  document.getElementById("addMsgBtn").onclick = addMessage;
  document.getElementById("resetCtxBtn").onclick = () => {
    msgCount = 0;
    renderContext(body);
  };
}

// ─── 3. TEMPERATURE ──────────────────────────────────────────────────────────
const TEMP_RESPONSES = {
  low: [
    "The Eiffel Tower is located in Paris, France.",
    "The capital of France is Paris.",
    "Water boils at 100°C at sea level.",
  ],
  mid: [
    "Paris is famous for the Eiffel Tower, its café culture, and world-class museums.",
    "France's capital blends historic grandeur with modern creative energy.",
    "Water, when heated to 100°C, transforms — steam rising, kettles singing.",
  ],
  high: [
    "Ah, Paris! Where iron lace scrapes heaven and every cobblestone whispers forgotten love affairs.",
    "France's soul lives in Paris — a city that tastes of croissants and contradiction.",
    "Boiling water: that magical rebellion where the liquid refuses to stay liquid any longer!",
  ]
};

function renderTemperature(body) {
  let temp = 1.0;
  body.innerHTML = `
    <div class="sim-label">Drag the slider — watch the AI's response change</div>
    <div class="temp-dial-row">
      <div class="temp-emoji" id="tempEmoji">🌡️</div>
      <input type="range" id="tempRange" min="0" max="2" step="0.1" value="1">
      <div class="temp-readout" id="tempReadout">1.0</div>
      <div class="temp-mood" id="tempMood">Balanced</div>
    </div>
    <div class="response-compare">
      <div class="response-box cold">
        <div class="rb-label">Low temp (predictable)</div>
        <div class="response-text" id="coldResp">
          The Eiffel Tower is located in <span class="highlight cold-h">Paris, France</span>.
        </div>
      </div>
      <div class="response-box hot">
        <div class="rb-label">High temp (creative)</div>
        <div class="response-text" id="hotResp">
          Ah, Paris! Where iron lace <span class="highlight hot-h">scrapes heaven</span> and every cobblestone whispers forgotten love affairs.
        </div>
      </div>
    </div>
    <div class="live-output">
      <div class="lo-label">Live output at current temperature</div>
      <div class="lo-text" id="liveText">The Eiffel Tower is located in Paris, France.</div>
    </div>
    <div class="controls">
      <button class="btn btn-teal" id="regenerateBtn">🔄 Regenerate</button>
    </div>
  `;

  function updateTemp(val) {
    temp = val;
    document.getElementById("tempReadout").textContent = val.toFixed(1);
    let mood, emoji, color;
    if (val < 0.4)       { mood = "Robotic";     emoji = "🧊"; color = "#0D7377"; }
    else if (val < 0.8)  { mood = "Precise";     emoji = "🎯"; color = "#1A6FAA"; }
    else if (val < 1.2)  { mood = "Balanced";    emoji = "🌡️"; color = "#1A7D46"; }
    else if (val < 1.6)  { mood = "Creative";    emoji = "🎨"; color = "#E8902A"; }
    else                 { mood = "Wild";         emoji = "🔥"; color = "#C0392B"; }
    document.getElementById("tempMood").textContent = mood;
    document.getElementById("tempMood").style.color = color;
    document.getElementById("tempEmoji").textContent = emoji;
    updateLive();
  }

  function updateLive() {
    const bucket = temp < 0.7 ? "low" : temp < 1.4 ? "mid" : "high";
    const options = TEMP_RESPONSES[bucket];
    const chosen = options[Math.floor(Math.random() * options.length)];
    const lo = document.getElementById("liveText");
    lo.style.opacity = "0";
    setTimeout(() => { lo.textContent = chosen; lo.style.transition = "opacity .3s"; lo.style.opacity = "1"; }, 150);
  }

  document.getElementById("tempRange").addEventListener("input", e => updateTemp(parseFloat(e.target.value)));
  document.getElementById("regenerateBtn").addEventListener("click", updateLive);
  updateTemp(1.0);
}

// ─── 4. HALLUCINATION ────────────────────────────────────────────────────────
const CLAIMS = [
  {
    text: "The Eiffel Tower was built in",
    inline: [
      {word: "1889", type: "true", verdict: "✅ TRUE — The Eiffel Tower was completed in 1889 for the World's Fair."},
    ]
  }
];

const HALU_PASSAGE = [
  {word: "Marie Curie", type: "true"},
  {word: " was born in ", type: "neutral"},
  {word: "Warsaw in 1867", type: "true"},
  {word: " and was the ", type: "neutral"},
  {word: "first woman to win a Nobel Prize", type: "true"},
  {word: ". She won the Nobel Prize in ", type: "neutral"},
  {word: "Chemistry in 1898", type: "false"},
  {word: " for her discovery of ", type: "neutral"},
  {word: "radium and polonium", type: "true"},
  {word: ". She completed her PhD at the ", type: "neutral"},
  {word: "University of Oxford", type: "false"},
  {word: " and later became a professor at the ", type: "neutral"},
  {word: "Sorbonne", type: "true"},
  {word: ". Her daughter ", type: "neutral"},
  {word: "Irène", type: "true"},
  {word: " also won a Nobel Prize in ", type: "neutral"},
  {word: "Medicine in 1935", type: "uncertain"},
  {word: ".", type: "neutral"},
];

const VERDICTS = {
  "Chemistry in 1898": "❌ HALLUCINATION — Curie won Physics in 1903 (with Pierre) and Chemistry in 1911, not 1898.",
  "University of Oxford": "❌ HALLUCINATION — Curie completed her doctorate at the University of Paris (Sorbonne), not Oxford.",
  "Medicine in 1935": "⚠️ PARTLY WRONG — Irène Joliot-Curie won the Nobel Prize in Chemistry in 1935, not Medicine.",
  "Warsaw in 1867": "✅ TRUE — Marie Curie was born in Warsaw on 7 November 1867.",
  "first woman to win a Nobel Prize": "✅ TRUE — Marie Curie was the first woman to win a Nobel Prize (Physics, 1903).",
  "radium and polonium": "✅ TRUE — She discovered both elements, polonium named after her homeland Poland.",
  "Sorbonne": "✅ TRUE — She became the first female professor at the Sorbonne in 1906.",
  "Irène": "✅ TRUE — Irène Joliot-Curie won the Nobel Prize in Chemistry in 1935.",
  "Marie Curie": "✅ TRUE — Marie Curie (1867–1934) was one of history's greatest scientists.",
};

function renderHallucination(body) {
  body.innerHTML = `
    <div class="sim-label">Click the highlighted claims to fact-check them</div>
    <div class="fact-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#1A7D46"></div> Verified true</div>
      <div class="legend-item"><div class="legend-dot" style="background:#C0392B"></div> Hallucinated</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E8902A"></div> Misleading / uncertain</div>
      <div class="legend-item" style="color:#8A97A8;font-size:11.5px">Grey = not yet checked</div>
    </div>
    <div class="doc-area" id="docArea"></div>
    <div class="fact-verdict" id="factVerdict">👆 Click a highlighted word or phrase to see if it's true</div>
    <div class="controls">
      <button class="btn btn-secondary" id="resetHaluBtn">↺ Reset highlighting</button>
      <button class="btn btn-amber" id="revealAllBtn">Reveal all facts</button>
    </div>
  `;

  const docArea = document.getElementById("docArea");
  const verdict = document.getElementById("factVerdict");

  function buildPassage(revealAll = false) {
    docArea.innerHTML = "";
    HALU_PASSAGE.forEach(chunk => {
      if (chunk.type === "neutral") {
        docArea.appendChild(document.createTextNode(chunk.word));
      } else {
        const span = document.createElement("span");
        span.className = "claim";
        span.textContent = chunk.word;
        if (revealAll) {
          span.classList.add(chunk.type === "true" ? "true-fact" : chunk.type === "false" ? "false-fact" : "uncertain");
        }
        span.addEventListener("click", () => {
          // clear all highlights first
          docArea.querySelectorAll(".claim").forEach(s => {
            s.classList.remove("true-fact","false-fact","uncertain");
          });
          // highlight this one
          span.classList.add(chunk.type === "true" ? "true-fact" : chunk.type === "false" ? "false-fact" : "uncertain");
          const v = VERDICTS[chunk.word.trim()] || "ℹ️ This detail is presented as neutral context.";
          verdict.textContent = v;
          verdict.classList.add("shown");
        });
        docArea.appendChild(span);
      }
    });
  }

  buildPassage();
  document.getElementById("resetHaluBtn").onclick = () => { buildPassage(); verdict.textContent = "👆 Click a highlighted word or phrase to see if it's true"; verdict.classList.remove("shown"); };
  document.getElementById("revealAllBtn").onclick = () => { buildPassage(true); verdict.textContent = "🔍 All claims revealed. Red = hallucinated, green = true, orange = misleading."; verdict.classList.add("shown"); };
}

// ─── 5. INFERENCE ────────────────────────────────────────────────────────────
const PIPE_STAGES = [
  { icon: "⌨️", name: "Prompt received", desc: "Your text is taken in and prepared", status: "Input" },
  { icon: "🔤", name: "Tokenisation", desc: "Text is split into tokens (sub-word units)", status: "Processing" },
  { icon: "🧮", name: "Embedding lookup", desc: "Each token becomes a vector of numbers", status: "Processing" },
  { icon: "🔄", name: "Transformer layers", desc: "Attention heads process context relationships", status: "Computing" },
  { icon: "📊", name: "Next-token prediction", desc: "Probability scores calculated for every possible token", status: "Predicting" },
  { icon: "🎲", name: "Sampling", desc: "A token is selected based on temperature setting", status: "Sampling" },
  { icon: "🔁", name: "Repeat until done", desc: "Steps 5–6 repeat until the response is complete", status: "Looping" },
  { icon: "✅", name: "Response delivered", desc: "Tokens are decoded back to readable text", status: "Output" },
];

const SAMPLE_OUTPUTS = {
  "What is AI?": "AI, or Artificial Intelligence, is the simulation of human-like reasoning by machines — enabling them to learn from data, recognise patterns, and make decisions.",
  "Summarise this in one sentence": "This document explores key concepts in AI literacy including tokens, context windows, temperature, hallucination, and inference.",
  "Write a professional email": "Dear Team,\n\nI hope this message finds you well. Please find below a summary of our recent discussion and the agreed next steps for your review.",
  "": "Hi! I'm ready to help. Please enter a prompt and click Run Inference ↗"
};

function renderInference(body) {
  let running = false;
  body.innerHTML = `
    <div class="sim-label">Enter a prompt and watch the inference pipeline run</div>
    <div class="prompt-input-row">
      <input type="text" id="inferInput" placeholder="e.g. What is AI?">
      <button class="btn btn-primary" id="runBtn">Run Inference ↗</button>
    </div>
    <div class="pipeline" id="pipeline"></div>
    <div class="output-area" id="outputArea"></div>
  `;

  // Build pipeline stages
  const pipeEl = document.getElementById("pipeline");
  PIPE_STAGES.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "pipe-stage";
    div.id = `stage-${i}`;
    div.innerHTML = `
      <div class="pipe-icon">${s.icon}</div>
      <div class="pipe-content">
        <div class="pipe-name">${s.name}</div>
        <div class="pipe-desc">${s.desc}</div>
      </div>
      <div class="pipe-status">${s.status}</div>
    `;
    pipeEl.appendChild(div);
    if (i < PIPE_STAGES.length - 1) {
      const arr = document.createElement("div");
      arr.className = "pipe-arrow";
      arr.textContent = "↓";
      pipeEl.appendChild(arr);
    }
  });

  document.getElementById("runBtn").onclick = () => {
    if (running) return;
    running = true;
    const prompt = document.getElementById("inferInput").value.trim();
    const outArea = document.getElementById("outputArea");
    outArea.classList.remove("show");
    outArea.textContent = "";

    // Reset all stages
    PIPE_STAGES.forEach((_, i) => {
      const el = document.getElementById(`stage-${i}`);
      el.classList.remove("active","done");
    });

    // Animate through stages
    let i = 0;
    function nextStage() {
      if (i > 0) {
        document.getElementById(`stage-${i-1}`).classList.remove("active");
        document.getElementById(`stage-${i-1}`).classList.add("done");
      }
      if (i >= PIPE_STAGES.length) {
        // Show output
        const key = Object.keys(SAMPLE_OUTPUTS).find(k => prompt.toLowerCase().includes(k.toLowerCase().slice(0,6))) || "";
        const out = SAMPLE_OUTPUTS[key] || `Based on your prompt "${prompt}", the model processes the tokens, weighs probabilities, and generates a response one token at a time — building meaning word by word.`;
        outArea.textContent = out;
        outArea.classList.add("show");
        running = false;
        return;
      }
      document.getElementById(`stage-${i}`).classList.add("active");
      document.getElementById(`stage-${i}`).scrollIntoView({block:"nearest",behavior:"smooth"});
      i++;
      const delay = i === 4 ? 700 : i === 5 ? 600 : 350;
      setTimeout(nextStage, delay);
    }
    nextStage();
  };

  document.getElementById("inferInput").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("runBtn").click();
  });
}
